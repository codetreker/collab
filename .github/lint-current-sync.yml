# lint-current-sync — module → docs/current path mapping
#
# Each entry: a code path prefix that, if any file under it changes in a PR,
# REQUIRES the matching docs/current/ subtree to also be touched.
#
# `exclude_globs` skips files that don't change behavior (pure tests, build
# artifacts) so unit-test-only PRs don't get flagged.
#
# Consumed by .github/workflows/lint.yml step "current sync lint".
# Adding a module: append below; do not delete entries (modules persist).

# Files matching any of these globs are NEVER considered a "code change" for
# current-sync purposes. Test files and snapshots don't change behavior, so
# they shouldn't force a docs/current update. (飞马 review on PR #170.)
exclude_globs:
  - "**/*_test.go"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/__snapshots__/**"
  - "**/testdata/**"

modules:
  - name: server
    code_prefix: packages/server-go/internal/
    docs_prefix: docs/current/server/
  - name: server-cmd
    code_prefix: packages/server-go/cmd/
    docs_prefix: docs/current/server/
  # admin SPA is physically nested under client/ but is its own module
  # (separate auth, separate cookie, separate docs/current/admin/). Listed
  # before `client` so the longest-prefix match wins.
  - name: admin
    code_prefix: packages/client/src/admin/
    docs_prefix: docs/current/admin/
  - name: client
    code_prefix: packages/client/src/
    docs_prefix: docs/current/client/
  - name: plugin-openclaw
    code_prefix: packages/plugins/
    docs_prefix: docs/current/plugin/
  - name: helper
    code_prefix: packages/helper/
    docs_prefix: docs/current/helper/
  - name: remote-agent
    code_prefix: packages/remote-agent/
    docs_prefix: docs/current/remote-agent/
