name: AL Release Gate (AL-2 wrapper ⭐)

# AL-2 wrapper release gate — runs on every PR to main + manual
# workflow_dispatch. Any step failure → workflow red → release block.
#
# Spec: docs/release/agent-lifecycle-release-gate.md (≥10 hard conditions).
# 不允许人工 sign-off 跳过任一 step (烈马 R2 立场 + HB-4 #509 立场 ① 承袭).
#
# 拆独立 yml from HB-4 release-gate.yml — host 层 (HB stack) vs runtime
# 层 (AL stack) 守门拆死. AL stack 走 agent_state_log + agent_status,
# HB stack 走 audit log; 字典分立反约束.
#
# 4.1 行为不变量 (this workflow) vs 4.2 demo 签字 (野马 docs/qa/signoffs/
# al-2-wrapper-yema-signoff.md) 拆死.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  al-release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # §1.1 5-state graph reflect lint (validTransitions byte-identical)
      - name: state-graph-reflect
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/store/ -run "TestValidateTransition|TestAppendAgentStateTransition" -count=1

      # §1.2 reason 字典锁链 ≥10 处 byte-identical (#496 SSOT 单源 verify)
      - name: reason-chain-cross-milestone
        run: |
          set -e
          # 6 reason const 跨 milestone 应 ≥10 hit (AL-1a→BPP-5 已 = 10 处)
          count=$(grep -rE 'reasons\.(APIKeyInvalid|QuotaExceeded|NetworkUnreachable|RuntimeCrashed|RuntimeTimeout|Unknown)' packages/server-go/internal/ | grep -v _test.go | wc -l)
          if [ "$count" -lt 6 ]; then
            echo "::error::reason chain drift — got $count source-side hits, expected ≥6 (AL-1a SSOT 跨 milestone 应每个 reason 至少 1 hit)"
            exit 1
          fi
          # reasons SSOT 文件本身必须存在
          test -f packages/server-go/internal/agent/reasons/reasons.go

      # §1.3 不另起第 7 reason
      - name: no-7th-reason
        run: |
          set -e
          hits=$(grep -rE 'reason.*7th|reason.*runtime_recovered|reason.*reconnect_success|new.*reason\.' packages/server-go/internal/ | grep -v _test.go | grep -v '反向 grep\|不另起\|不挂\|0 hit\|MUST NOT' | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::第 7 reason drift detected ($hits hits, AL-1a 6-dict 锁链反约束)"
            grep -rE 'reason.*7th|reason.*runtime_recovered|reason.*reconnect_success|new.*reason\.' packages/server-go/internal/ | grep -v _test.go | grep -v '反向 grep\|不另起\|不挂\|0 hit\|MUST NOT'
            exit 1
          fi

      # §1.4 不挂 connecting 持久态 (BPP-5 立场承袭)
      - name: no-connecting-persisted
        run: |
          set -e
          hits=$(grep -nE 'AgentStateConnecting|state.*connecting' packages/server-go/internal/store/agent_state_log.go 2>/dev/null | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::connecting 持久态 drift (BPP-5 立场承袭反约束: connecting 是 transient 中间态, 不入 5-state graph)"
            grep -nE 'AgentStateConnecting|state.*connecting' packages/server-go/internal/store/agent_state_log.go
            exit 1
          fi

      # §2.5 AL-1.4 state log coverage 真测 (5 transition + GET endpoint)
      - name: al-1-4-state-log-coverage
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/api/ -run TestAL14 -count=1

      # §2.6 AL-2a config blob validation 真测
      - name: al-2a-config-blob-validation
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/api/ -run TestAL2A2 -count=1

      # §2.7 AL-2b BPP frame fanout 真测
      - name: al-2b-bpp-fanout
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/ws/ -run TestAL2B2 -count=1

      # §2.8 busy/idle BPP source 锁 (AL-1b 立场 ②)
      - name: busy-idle-bpp-source
        run: |
          set -e
          hits=$(grep -rnE 'presence_sessions.*UPDATE.*busy|presence.*set.*busy' packages/server-go/internal/store/ 2>/dev/null | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::busy/idle source drift (AL-1b 立场 ② BPP frame 唯一 source, presence_sessions 不写 busy 列)"
            grep -rnE 'presence_sessions.*UPDATE.*busy|presence.*set.*busy' packages/server-go/internal/store/
            exit 1
          fi

      # §3.9 AL stack vs HB stack audit 字典分立
      - name: dict-isolation-al-vs-hb
        run: |
          set -e
          hits=$(grep -rnE 'agent_state_log.*JOIN.*audit_log|agent_status.*JOIN.*audit_log' packages/server-go/internal/ 2>/dev/null | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::AL stack vs HB stack audit 字典分立 drift (AL 走 agent_state_log+agent_status, HB 走 audit_log, 拆死)"
            exit 1
          fi

      # §3.10 不允许人工 sign-off 跳过 AL release gate
      - name: no-bypass
        run: |
          set -e
          patterns='al\.release\.gate.*skip|al\.release.*manual.*sign|allow.*bypass.*al|--admin.*merge.*al\.release|al\.release.*human\.review|al\.release.*demo\.signoff'
          # --exclude self-file 防 yml 内 patterns 字符串定义匹配自己
          # (跟 HB-4 release-gate.yml 同一 self-grep false positive bug 模式;
          # HB-4 留 follow-up). docs/release/ md 文件以 反向 grep / count==0 /
          # 不允许 / 拆死 等元词 grep -v 守.
          hits=$(grep -rE "$patterns" docs/release/ .github/workflows/ \
                 --exclude='al-release-gate.yml' --exclude='release-gate.yml' \
                 2>/dev/null \
                 | grep -vE '反向 grep|count==0|不允许|MUST NOT|拆死|留账|拒.*跳过' | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::AL release-gate bypass / sign-off skip patterns found ($hits hits)"
            grep -rE "$patterns" docs/release/ .github/workflows/ \
                 --exclude='al-release-gate.yml' --exclude='release-gate.yml' \
                 | grep -vE '反向 grep|count==0|不允许|MUST NOT|拆死|留账|拒.*跳过'
            exit 1
          fi

      # §3.11 admin god-mode 不入 AL release gate
      - name: no-admin-godmode-al
        run: |
          set -e
          hits=$(grep -rnE 'admin.*al\.release\.gate|admin.*AL2W' packages/server-go/internal/api/ 2>/dev/null | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::admin god-mode reference in AL release-gate path ($hits hits, ADM-0 §1.3 红线)"
            exit 1
          fi

      # §3.12 AL yml 跟 HB-4 yml 拆独立 — host vs runtime 守门拆死
      - name: al-vs-hb-yml-isolation
        run: |
          set -e
          # AL yml 不应引用 host 层概念
          hits=$(grep -E 'host_grants|host_bridge|install-butler' .github/workflows/al-release-gate.yml 2>/dev/null | grep -vE '反向 grep|count==0|不应引用|拆独立|拆死|host vs runtime' | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::AL yml 引用 host 层概念 (字典分立反约束: AL stack 跟 HB stack 拆独立 yml)"
            exit 1
          fi
