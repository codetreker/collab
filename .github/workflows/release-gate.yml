name: Release Gate (HB-4 ⭐)

# HB-4 release gate — runs on every PR to main + manual workflow_dispatch.
# Any step failure → workflow red → release block.
#
# Spec: docs/release/host-bridge-release-gate.md (≥10 hard conditions).
# 不允许人工 sign-off 跳过任一 step (烈马 R2 立场).
#
# 4.1 行为不变量 (this workflow) vs 4.2 demo 签字 (野马 docs/qa/signoffs/
# hb-4-yema-signoff.md) 拆死 — 不混入.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # §1.4 + §3 audit schema 跨四 milestone byte-identical (HB-1+HB-2
      # 待 Rust crate 真实施补到 5 处). HB-3 + BPP-4 实施已就绪 ≥4 hit.
      - name: audit-schema-cross-milestone
        run: |
          set -e
          # actor / action / target / when / scope 5 字段 byte-identical
          # 跟 BPP-4 dead_letter + HB-3 host_grants
          count=$(grep -rE '"actor"' packages/server-go/internal/api/host_grants.go packages/server-go/internal/bpp/dead_letter.go | wc -l)
          if [ "$count" -lt 2 ]; then
            echo "::error::audit schema actor field missing in HB-3 + BPP-4 sources (got $count, expected ≥2)"
            exit 1
          fi
          for key in actor action target when scope; do
            for src in packages/server-go/internal/api/host_grants.go packages/server-go/internal/bpp/dead_letter.go; do
              if ! grep -qE "\"$key\"" "$src"; then
                echo "::error::audit schema field \"$key\" missing in $src (跨四 milestone byte-identical 锁链)"
                exit 1
              fi
            done
          done

      # §2 立场 ⑥ AST scan 锁链跨三 milestone (BPP-4 + BPP-5 + HB-3)
      - name: ast-scan-bpp4
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/bpp/ -run TestBPP4_NoRetryQueueInBPPPackage -count=1

      - name: ast-scan-bpp5
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/bpp/ -run TestBPP5_NoReconnectQueueInBPPPackage -count=1

      - name: ast-scan-hb3
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/api/ -run TestHB3_NoGrantQueueInAPIPackage -count=1

      # §1.5 撤销 grant < 100ms 真测 (HB-3 #504)
      - name: revoke-latency
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/api/ -run TestHB3_DELETE_RevokeStampsRevokedAt -count=1

      # §2 立场 ⑩ host vs runtime 字典分立 (HB-3 不复用 user_permissions)
      - name: dict-isolation
        run: cd packages/server-go && go test -tags sqlite_fts5 ./internal/api/ -run TestHB3_NoUserPermissionsJoin -count=1

      # §3 立场 ⑤ 数字常量单源锁 (BPP-4 30s heartbeat byte-identical)
      - name: numeric-singletons
        run: |
          set -e
          count=$(grep -rE 'BPP_HEARTBEAT_TIMEOUT_SECONDS\s*=\s*30' packages/server-go/internal/bpp/ | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "::error::BPP-4 30s heartbeat constant single-source drift (got $count, expected ≥1)"
            exit 1
          fi
          # 反向断言: 高于 30s 的 timeout 0 hit (防隐式调高)
          drift=$(grep -rE 'heartbeat.*timeout.*[5-9][0-9]+s|heartbeatTimeout.*=.*[1-9][0-9]{2,}' packages/server-go/internal/bpp/ | wc -l)
          if [ "$drift" -gt 0 ]; then
            echo "::error::heartbeat timeout drifted above 30s ($drift hits)"
            exit 1
          fi

      # §3 立场 ① + ④ no-bypass — 不允许人工 sign-off 跳过 + 4.1/4.2 拆死
      - name: no-bypass
        run: |
          set -e
          patterns='release.gate.*skip|release.gate.*manual.*sign|allow.*bypass|--admin.*merge.*release|release.gate.*human.review|release.gate.*demo.signoff'
          # Scan release docs + workflows. Self-file + sibling AL yml
          # excluded so the patterns string definition in this file (and
          # in al-release-gate.yml) doesn't false-positive match itself.
          # (跟 AL-2 wrapper #512 8ad9975 同 self-grep fix 模式承袭.)
          # Metaword grep -v 守 docs/release/ md 中合法字面提及 (反向 grep /
          # count==0 / 不允许 / MUST NOT / 拆死 / 留账).
          hits=$(grep -rE "$patterns" docs/release/ .github/workflows/ \
                 --exclude='release-gate.yml' --exclude='al-release-gate.yml' \
                 2>/dev/null \
                 | grep -vE '反向 grep|count==0|不允许|MUST NOT|拆死|留账' | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::release-gate bypass / sign-off skip / 4.1/4.2 mix patterns found ($hits hits)"
            grep -rE "$patterns" docs/release/ .github/workflows/ \
                 --exclude='release-gate.yml' --exclude='al-release-gate.yml' \
                 | grep -vE '反向 grep|count==0|不允许|MUST NOT|拆死|留账'
            exit 1
          fi

      # §3 立场 ⑦ admin god-mode 不入 release gate
      - name: no-admin-godmode-release
        run: |
          set -e
          hits=$(grep -rE 'admin.*release.gate|admin.*HB4' packages/server-go/internal/api/ 2>/dev/null | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::admin god-mode reference in release-gate path ($hits hits, ADM-0 §1.3 红线)"
            grep -rE 'admin.*release.gate|admin.*HB4' packages/server-go/internal/api/
            exit 1
          fi

      # AP-4-enum 立场 ② — capability 字面 hardcode 反向 grep + helper 单源
      # (跟 BPP-4 AST scan / HB-3 dict-isolation 同模式; 一行 hardcode → CI red).
      # 测试代码 (_test.go) 白名单允许. Spec: ap-4-enum-spec.md §0 立场 ②.
      - name: ap4enum-no-hardcode-capability
        run: |
          set -e
          # ① handler hardcode HasCapability("...") 字面禁 (走 const 单源)
          hits=$(git grep -nE 'HasCapability\("[a-z_]+"' \
                 -- 'packages/server-go/internal/api/*.go' \
                 ':(exclude)packages/server-go/internal/api/*_test.go' \
                 | wc -l)
          if [ "$hits" -gt 0 ]; then
            echo "::error::AP-4-enum 立场 ② — handler hardcode capability literal ($hits hits, must use auth.* const)"
            git grep -nE 'HasCapability\("[a-z_]+"' \
                 -- 'packages/server-go/internal/api/*.go' \
                 ':(exclude)packages/server-go/internal/api/*_test.go'
            exit 1
          fi
          # ② handler 直查 auth.Capabilities[ 禁 (走 IsValidCapability helper 单源)
          mapHits=$(git grep -nE 'auth\.Capabilities\[' \
                    -- 'packages/server-go/internal/api/*.go' \
                    ':(exclude)packages/server-go/internal/api/*_test.go' \
                    | wc -l)
          if [ "$mapHits" -gt 0 ]; then
            echo "::error::AP-4-enum 立场 ③ — handler direct Capabilities[name] access ($mapHits hits, must use auth.IsValidCapability)"
            git grep -nE 'auth\.Capabilities\[' \
                    -- 'packages/server-go/internal/api/*.go' \
                    ':(exclude)packages/server-go/internal/api/*_test.go'
            exit 1
          fi
          # ③ Capabilities map mutate 字面禁 (仅 init() 走 Capabilities[c]=true 变量)
          mutHits=$(git grep -nE 'Capabilities\[".*"\]\s*=' \
                    -- 'packages/server-go/internal/auth/*.go' \
                    ':(exclude)packages/server-go/internal/auth/*_test.go' \
                    | wc -l)
          if [ "$mutHits" -gt 0 ]; then
            echo "::error::AP-4-enum 立场 ① — Capabilities map literal mutate ($mutHits hits, only init() may write via variable)"
            git grep -nE 'Capabilities\[".*"\]\s*=' \
                    -- 'packages/server-go/internal/auth/*.go' \
                    ':(exclude)packages/server-go/internal/auth/*_test.go'
            exit 1
          fi
          # ④ admin god-mode 字面入 capabilities.go 禁 (ADM-0 §1.3 红线)
          godHits=$(grep -cE 'admin_|godmode_|impersonat' packages/server-go/internal/auth/capabilities.go || true)
          if [ "$godHits" -gt 0 ]; then
            echo "::error::AP-4-enum 立场 ① — admin god-mode literal in capabilities.go ($godHits hits, ADM-0 §1.3 红线)"
            exit 1
          fi


      # 当前 server-go 段无 startup binary, 锁 placeholder 跟 spec brief 一致
      - name: startup-benchmark
        run: |
          echo "::notice::startup-benchmark deferred — HB-1/HB-2 Rust crate 真实施 PR 加 cargo bench < 800ms"
          # placeholder: assert spec contract not drifted
          test -f docs/implementation/modules/hb-1-spec.md
          test -f docs/implementation/modules/hb-2-spec.md

      # §1.2 dogfood-crash-rate placeholder (release 前 1 周真测回填)
      - name: dogfood-crash-rate
        run: |
          echo "::notice::dogfood-crash-rate deferred — release 前 1 周内部 dogfood 真测, 数据回填 docs/evidence/hb-4-dogfood/"
          # placeholder: don't fail; spec brief §2 留账已锚

      # §1.3 signature-pass-rate placeholder (HB-1 真实施时跑)
      - name: signature-pass-rate
        run: |
          echo "::notice::signature-pass-rate deferred — HB-1 install-butler Rust crate 真实施 PR 加 contract test"
          # placeholder: assert HB-1 spec contract not drifted
          test -f docs/implementation/modules/hb-1-spec.md
          grep -q 'gpg_signature' docs/implementation/modules/hb-1-spec.md

      # INFRA-3 progress-line-budget — PROGRESS.md 主文件瘦身锁
      # (反战马 commit 塞 1500+ 字符到 milestone 行 + 反主文件行膨胀).
      # 锁链第 5 处 (BPP-4 AST scan / HB-3 dict-isolation / AP-4-enum / HB-4 audit-schema 同模式).
      - name: progress-line-budget
        run: |
          # ① 主 PROGRESS.md 单行 ≤200 字符
          longLines=$(awk '{ if (length > 200) print NR":"length }' docs/implementation/PROGRESS.md || true)
          if [ -n "$longLines" ]; then
            echo "::error::INFRA-3 立场 ① — PROGRESS.md 单行超 200 字符 (战马 commit 历史塞主文件):"
            echo "$longLines"
            echo "::notice::长 milestone detail 应入 progress/phase-N.md 子文件"
            exit 1
          fi
          # ② 主 PROGRESS.md 总行 ≤100
          totalLines=$(wc -l < docs/implementation/PROGRESS.md)
          if [ "$totalLines" -gt 100 ]; then
            echo "::error::INFRA-3 立场 ① — PROGRESS.md 总行 $totalLines > 100 (主文件瘦身锁)"
            exit 1
          fi
          # ③ 5 子文件存在
          for p in 0 1 2 3 4; do
            if [ ! -f "docs/implementation/progress/phase-$p.md" ]; then
              echo "::error::INFRA-3 立场 ② — progress/phase-$p.md 缺失"
              exit 1
            fi
          done
          # ④ 主 PROGRESS.md 不含 checkbox (单一翻牌点入子文件)
          checkboxHits=$(grep -cE '^- \[ \]|^- \[x\]' docs/implementation/PROGRESS.md || true)
          if [ "$checkboxHits" -gt 0 ]; then
            echo "::error::INFRA-3 立场 ③ — PROGRESS.md 主文件含 $checkboxHits 行 checkbox; milestone 翻牌点应入 progress/phase-N.md"
            exit 1
          fi
          # ⑤ 跳转锚 ≥5 hit
          jumpHits=$(grep -cE 'progress/phase-[0-4]\.md' docs/implementation/PROGRESS.md || true)
          if [ "$jumpHits" -lt 5 ]; then
            echo "::error::INFRA-3 立场 ② — PROGRESS.md 跳转锚 $jumpHits < 5 (5 phase 全锚)"
            exit 1
          fi
          echo "::notice::progress-line-budget PASS — PROGRESS.md $totalLines 行 / 0 长行 / 0 checkbox / $jumpHits 跳转锚 / 5 子文件就位"
