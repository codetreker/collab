name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  REGISTRY: harbor.coretrek.cn
  IMAGE: harbor.coretrek.cn/coretrek/collab
  HARBOR_USER: "robot$coretrek+github-ci"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @collab/server --filter @collab/client --filter collab
      - run: pnpm --filter @collab/client build
      - run: pnpm --filter @collab/server build
      - run: cd packages/server && npx vitest run

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_API_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ env.HARBOR_USER }}" --password-stdin

      - name: Build and push
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:staging \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:staging

      - name: Deploy staging
        uses: appleboy/ssh-action@v1
        env:
          HARBOR_API_TOKEN: ${{ secrets.HARBOR_API_TOKEN }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          envs: HARBOR_API_TOKEN
          script: |
            echo "$HARBOR_API_TOKEN" | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin
            docker pull ${{ env.IMAGE }}:${{ github.sha }}
            docker tag ${{ env.IMAGE }}:${{ github.sha }} collab:staging
            cd /opt/dockers/collab-staging
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4901/ > /dev/null && echo "✅ Staging healthy" || (echo "❌ Staging unhealthy" && exit 1)
            docker image prune -f

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy production
        uses: appleboy/ssh-action@v1
        env:
          HARBOR_API_TOKEN: ${{ secrets.HARBOR_API_TOKEN }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          envs: HARBOR_API_TOKEN
          script: |
            echo "$HARBOR_API_TOKEN" | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin
            docker pull ${{ env.IMAGE }}:${{ github.sha }}
            docker tag ${{ env.IMAGE }}:${{ github.sha }} collab:prod
            cd /opt/dockers/collab
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4900/ > /dev/null && echo "✅ Production healthy" || (echo "❌ Production unhealthy" && exit 1)
            docker image prune -f

      - name: Tag release
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const tag = `v${now.getUTCFullYear()}${String(now.getUTCMonth()+1).padStart(2,'0')}${String(now.getUTCDate()).padStart(2,'0')}-${String(now.getUTCHours()).padStart(2,'0')}${String(now.getUTCMinutes()).padStart(2,'0')}${String(now.getUTCSeconds()).padStart(2,'0')}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            core.info(`Tagged: ${tag}`);
