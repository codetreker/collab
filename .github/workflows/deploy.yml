name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE: default/borgee
  HARBOR_USER: ${{ vars.HARBOR_USER }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/server-go/go.mod
      - run: pnpm install --frozen-lockfile --filter @borgee/client --filter borgee
      - run: pnpm --filter @borgee/client build
      - run: cd packages/server-go && go test ./...

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      build_tag: ${{ steps.tag.outputs.build_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate build tag
        id: tag
        run: echo "build_tag=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        run: echo '${{ secrets.HARBOR_API_TOKEN }}' | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin

      - name: Build and push (Go server)
        run: |
          docker build \
            -f packages/server-go/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.build_tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:staging \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.build_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:staging

      - name: Deploy staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            mkdir -p /opt/dockers/collab-staging
            cat > /opt/dockers/collab-staging/docker-compose.yml << 'COMPEOF'
            services:
              borgee-staging:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE }}:staging
                container_name: borgee-staging
                restart: unless-stopped
                user: "0:0"
                ports:
                  - "4901:4900"
                volumes:
                  - borgee-staging-data:/app/data
                environment:
                  - HOST=0.0.0.0
                  - PORT=4900
                  - NODE_ENV=production
                  - DATABASE_PATH=/app/data/collab.db
                  - UPLOAD_DIR=/app/data/uploads
                  - WORKSPACE_DIR=/app/data/workspaces
                  - CLIENT_DIST=/app/client/dist
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
                  - ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            volumes:
              borgee-staging-data:
            COMPEOF
            cd /opt/dockers/collab-staging
            docker compose pull
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4901/ > /dev/null && echo "✅ Staging healthy" || (echo "❌ Staging unhealthy" && exit 1)
            docker image prune -f

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Tag prod via Harbor API
        run: |
          curl -sf -u '${{ env.HARBOR_USER }}:${{ secrets.HARBOR_API_TOKEN }}' \
            -X DELETE 'https://${{ env.REGISTRY }}/api/v2.0/projects/default/repositories/borgee/artifacts/prod/tags/prod' || true
          curl -sf -u '${{ env.HARBOR_USER }}:${{ secrets.HARBOR_API_TOKEN }}' \
            -X POST 'https://${{ env.REGISTRY }}/api/v2.0/projects/default/repositories/borgee/artifacts/${{ needs.deploy-staging.outputs.build_tag }}/tags' \
            -H 'Content-Type: application/json' \
            -d '{"name":"prod"}'

      - name: Deploy production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            mkdir -p /opt/dockers/collab
            cat > /opt/dockers/collab/docker-compose.yml << 'COMPEOF'
            services:
              borgee:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE }}:prod
                container_name: borgee
                restart: unless-stopped
                user: "0:0"
                ports:
                  - "4900:4900"
                volumes:
                  - borgee-data:/app/data
                environment:
                  - HOST=0.0.0.0
                  - PORT=4900
                  - NODE_ENV=production
                  - DATABASE_PATH=/app/data/collab.db
                  - UPLOAD_DIR=/app/data/uploads
                  - WORKSPACE_DIR=/app/data/workspaces
                  - CLIENT_DIST=/app/client/dist
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
                  - ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            volumes:
              borgee-data:
            COMPEOF
            cd /opt/dockers/collab
            docker compose pull
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4900/ > /dev/null && echo "✅ Production healthy" || (echo "❌ Production unhealthy" && exit 1)
            docker image prune -f

      - name: Tag release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.deploy-staging.outputs.build_tag }}';
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${tag}`,
              sha: context.sha
            });
            core.info(`Tagged: v${tag}`);
