name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE: library/collab
  HARBOR_USER: ${{ vars.HARBOR_USER }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @collab/server --filter @collab/client --filter collab
      - run: pnpm --filter @collab/client build
      - run: pnpm --filter @collab/server build
      - run: cd packages/server && npx vitest run

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      build_tag: ${{ steps.tag.outputs.build_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate build tag
        id: tag
        run: echo "build_tag=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        run: echo '${{ secrets.HARBOR_API_TOKEN }}' | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin

      - name: Build and push
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.build_tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:staging \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.build_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:staging

      - name: Deploy staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/dockers/collab-staging
            docker compose pull
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4901/ > /dev/null && echo "✅ Staging healthy" || (echo "❌ Staging unhealthy" && exit 1)
            docker image prune -f

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Harbor
        run: echo '${{ secrets.HARBOR_API_TOKEN }}' | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin

      - name: Tag and push prod
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ needs.deploy-staging.outputs.build_tag }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ needs.deploy-staging.outputs.build_tag }} ${{ env.REGISTRY }}/${{ env.IMAGE }}:prod
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:prod

      - name: Deploy production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/dockers/collab
            docker compose pull
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4900/ > /dev/null && echo "✅ Production healthy" || (echo "❌ Production unhealthy" && exit 1)
            docker image prune -f

      - name: Tag release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.deploy-staging.outputs.build_tag }}';
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${tag}`,
              sha: context.sha
            });
            core.info(`Tagged: v${tag}`);
