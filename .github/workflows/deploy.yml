name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @collab/server --filter @collab/client --filter collab
      - run: pnpm --filter @collab/client build
      - run: pnpm --filter @collab/server build
      - run: cd packages/server && npx vitest run

  build-and-deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t collab:${{ github.sha }} .

      - name: Save image
        run: docker save collab:${{ github.sha }} | gzip > ${{ github.workspace }}/collab-image.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ALIYUN_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer image
        run: scp -i ~/.ssh/deploy_key ${{ github.workspace }}/collab-image.tar.gz ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/tmp/collab-image.tar.gz

      - name: Deploy staging
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} << DEPLOY
            docker load < /tmp/collab-image.tar.gz
            docker tag collab:${{ github.sha }} collab:staging
            cd /opt/dockers/collab-staging
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4901/ > /dev/null && echo "✅ Staging healthy" || (echo "❌ Staging unhealthy" && exit 1)
            rm -f /tmp/collab-image.tar.gz
          DEPLOY

  deploy-prod:
    needs: build-and-deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ALIYUN_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy production
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} << DEPLOY
            docker tag collab:${{ github.sha }} collab:prod
            cd /opt/dockers/collab
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4900/ > /dev/null && echo "✅ Production healthy" || (echo "❌ Production unhealthy" && exit 1)
            docker image prune -f
          DEPLOY

      - name: Tag release
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const tag = `v${now.getUTCFullYear()}${String(now.getUTCMonth()+1).padStart(2,'0')}${String(now.getUTCDate()).padStart(2,'0')}-${String(now.getUTCHours()).padStart(2,'0')}${String(now.getUTCMinutes()).padStart(2,'0')}${String(now.getUTCSeconds()).padStart(2,'0')}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            core.info(`Tagged: ${tag}`);
