name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy to test environment'
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE: default/collab
  HARBOR_USER: ${{ vars.HARBOR_USER }}

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Login to Harbor
        run: echo '${{ secrets.HARBOR_API_TOKEN }}' | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin

      - name: Build and push (Go server)
        run: |
          docker build \
            -f packages/server-go/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:test \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:test

      - name: Deploy test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            mkdir -p /opt/dockers/collab-test
            cat > /opt/dockers/collab-test/docker-compose.yml << 'COMPEOF'
            services:
              collab-test:
                image: cr.codetrek.work/default/collab:test
                container_name: collab-test
                restart: unless-stopped
                user: "0:0"
                ports:
                  - "4902:4900"
                volumes:
                  - collab-test-data:/app/data
                environment:
                  - HOST=0.0.0.0
                  - PORT=4900
                  - NODE_ENV=production
                  - DATABASE_PATH=/app/data/collab.db
                  - UPLOAD_DIR=/app/data/uploads
                  - WORKSPACE_DIR=/app/data/workspaces
                  - CLIENT_DIST=/app/client/dist
                  - JWT_SECRET=test-env-jwt-secret-b07b08
            volumes:
              collab-test-data:
            COMPEOF
            cd /opt/dockers/collab-test
            docker compose pull
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4902/health > /dev/null && echo "✅ Test healthy" || (echo "❌ Test unhealthy" && exit 1)
            docker image prune -f
