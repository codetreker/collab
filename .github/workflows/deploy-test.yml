name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy to test environment'
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE: default/collab
  HARBOR_USER: ${{ vars.HARBOR_USER }}

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Login to Harbor
        run: echo '${{ secrets.HARBOR_API_TOKEN }}' | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin

      - name: Build base image if needed
        id: base
        run: |
          BASE_HASH=$(cat Dockerfile.base pnpm-lock.yaml | sha256sum | cut -c1-8)
          echo "base_hash=$BASE_HASH" >> "$GITHUB_OUTPUT"
          if docker pull ${{ env.REGISTRY }}/default/collab-base:${BASE_HASH} 2>/dev/null; then
            echo "✅ Base image exists, skipping build"
          else
            echo "🔨 Building base image..."
            docker build -f Dockerfile.base \
              -t ${{ env.REGISTRY }}/default/collab-base:${BASE_HASH} .
            docker push ${{ env.REGISTRY }}/default/collab-base:${BASE_HASH}
          fi
          docker tag ${{ env.REGISTRY }}/default/collab-base:${BASE_HASH} collab-base:${BASE_HASH}

      - name: Build and push
        run: |
          docker build \
            --build-arg BASE_TAG=${{ steps.base.outputs.base_hash }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:test \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:test

      - name: Deploy test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/dockers/collab-test
            docker compose pull
            docker compose up -d
            sleep 5
            curl -sf http://localhost:4902/ > /dev/null && echo "✅ Test healthy" || (echo "❌ Test unhealthy" && exit 1)
            docker image prune -f
