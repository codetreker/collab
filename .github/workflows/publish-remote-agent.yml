name: Publish Remote Agent

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: NPM_TRUSTED_CONN
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile --filter @codetreker/collab-remote-agent
      - run: pnpm --filter @codetreker/collab-remote-agent build
      - name: Bump version
        working-directory: packages/remote-agent
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Publish
        working-directory: packages/remote-agent
        run: npm publish --provenance --access public
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/remote-agent/package.json
          git commit -m "chore(remote-agent): bump to v${{ env.VERSION }}"
          git push
