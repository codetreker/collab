name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - plugin
          - remote-agent
          - both

permissions:
  contents: write
  id-token: write

jobs:
  publish-plugin:
    if: inputs.package == 'plugin' || inputs.package == 'both'
    runs-on: ubuntu-latest
    environment: NPM_TRUSTED_CONN
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile --filter @codetreker/collab-openclaw-plugin
      - run: pnpm --filter @codetreker/collab-openclaw-plugin build
      - name: Bump version
        working-directory: packages/plugin
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Publish
        working-directory: packages/plugin
        run: npm publish --provenance --access public
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/plugin/package.json
          git commit -m "chore(plugin): bump to v${{ env.VERSION }}"
          git push

  publish-remote-agent:
    if: inputs.package == 'remote-agent' || inputs.package == 'both'
    runs-on: ubuntu-latest
    environment: NPM_TRUSTED_CONN
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile --filter @codetreker/collab-remote-agent
      - run: pnpm --filter @codetreker/collab-remote-agent build
      - name: Bump version
        working-directory: packages/remote-agent
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Publish
        working-directory: packages/remote-agent
        run: npm publish --provenance --access public
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/remote-agent/package.json
          git commit -m "chore(remote-agent): bump to v${{ env.VERSION }}"
          git push
