name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @collab/server --filter @collab/client --filter collab
      - run: pnpm --filter @collab/client build
      - run: pnpm --filter @collab/server build
      - run: cd packages/server && npx vitest run --coverage
      - name: Check coverage >= 80%
        run: |
          COVERAGE=$(node -e "const c=require('./packages/server/coverage/coverage-summary.json'); console.log(c.total.statements.pct)")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
