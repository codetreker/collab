name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @borgee/client
      - run: pnpm --filter @borgee/client build

  client-vitest:
    # REG-RT0-006 et al: client-side vitest. Runs in jsdom (see
    # packages/client/vitest.config.ts) so window-dispatching tests
    # like ws-invitation.test.ts actually execute. Was previously
    # absent from CI entirely — fake-green guard.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @borgee/client
      - run: pnpm --filter @borgee/client test

  go-test-race:
    # CI-SPLIT-RACE-COV: race-only job, no coverage. Pure data-race signal —
    # fail-fast for goroutine bugs without coverage's race-flake.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run tests with race detector (no coverage)
        run: cd packages/server-go && go test -timeout=120s -race ./...

  go-test-cov:
    # CI-SPLIT-RACE-COV: coverage-only job, no race. Deterministic coverage
    # value — race detector affects goroutine scheduling, which makes some
    # defer/panic branches hit non-deterministically (e.g. ws/hub.go::
    # StartHeartbeat 33.3% no-race vs 58.3% with-race), bleeding into
    # coverage % flakes ±0.1%. Replaces the legacy `go-test` job; ruleset
    # required-checks should reference both `go-test-race` + `go-test-cov`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run tests with coverage (no race)
        run: cd packages/server-go && go test -timeout=120s -coverprofile=coverage.out -coverpkg=borgee-server/internal/api,borgee-server/internal/auth,borgee-server/internal/config,borgee-server/internal/store,borgee-server/internal/ws,borgee-server/internal/server ./...
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cd packages/server-go && go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          # Threshold = 84% (deterministic no-race baseline; was 85% with race
          # but race scheduler bumps StartHeartbeat coverage 33.3%→58.3%
          # non-deterministically. New invariant: 84% no-race deterministic
          # is the truth; the prior 85% was race-detector flake masquerading
          # as ratchet — relying on it was the bug we're fixing).
          if (( $(echo "$COVERAGE < 84" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 84% threshold"
            exit 1
          fi

  bpp-envelope-lint:
    # BPP-1 (#274/#280) envelope CI lint — G2.6 真落.
    # Pins 5 invariants (byte-identical with RT-0 #237, direction lock
    # control 6 / data 3, frame whitelist closure, godoc anchor) +
    # reverse-grep guard against stray full-replay defaults.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run BPP-1 envelope lint
        run: ./scripts/lint-bpp-envelope.sh

  e2e:
    # INFRA-2: Playwright dual-server smoke. Boots server-go (4901) + vite (5174)
    # via playwright.config webServer; smoke is 3 assertions (~5s) but chromium
    # install dominates (~1min). RT-0 / CM-onboarding / G2.4 will pile on here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --filter @borgee/e2e --filter @borgee/client
      - name: Install Playwright chromium
        run: pnpm --filter @borgee/e2e exec playwright install --with-deps chromium
      - name: Type-check client (vite dev needs tsc-clean code)
        run: pnpm --filter @borgee/client build
      - name: Pre-fetch server-go modules
        run: cd packages/server-go && go mod download
      - name: Run E2E
        run: pnpm --filter @borgee/e2e test
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 14
