name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @borgee/client
      - run: pnpm --filter @borgee/client build

  client-vitest:
    # REG-RT0-006 et al: client-side vitest. Runs in jsdom (see
    # packages/client/vitest.config.ts) so window-dispatching tests
    # like ws-invitation.test.ts actually execute. Was previously
    # absent from CI entirely — fake-green guard.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @borgee/client
      - run: pnpm --filter @borgee/client test

  go-test-race:
    # CI-SPLIT-RACE-COV: race-only job, no coverage. Pure data-race signal —
    # fail-fast for goroutine bugs without coverage's race-flake.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run tests with race detector (no coverage)
        # TEST-FIX-3 立场 ③: 主 race job 维持 120s timeout (反全局 bump mask).
        # race-heavy sub-test (TestClosedStoreInternalErrorBranches) 已隔离到
        # `//go:build race_heavy` tag, 走独立 sub-job (go-test-race-heavy)
        # 不污染主 race job timeout 阈值. 主 race job 是 race regression 早期信号.
        run: cd packages/server-go && go test -tags sqlite_fts5 -timeout=120s -race ./...

  go-test-race-heavy:
    # TEST-FIX-3: race-heavy sub-job, 单独跑 `//go:build race_heavy` tag 文件
    # (TestClosedStoreInternalErrorBranches 11 sub-test, race-heavy serialize 长).
    # 跟主 go-test-race job 并行不互拖. timeout 180s (50% 余量, 不是 mask —
    # 真因 race-heavy sub-test 本质需更长预算, 隔离 budget 是诚实做法,
    # 不是吞下 timeout 阈值).
    #
    # 真因诊断 (#608 TEST-FIX-2 已修 goroutine leak; 主 race job 仍贴近 120s
    # 间歇性 flake 因 race-heavy sub-test 集中. 隔离后主路径稳定).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run race-heavy tests (build tag race_heavy)
        run: cd packages/server-go && go test -tags 'sqlite_fts5 race_heavy' -timeout=180s -race -run TestClosedStoreInternalErrorBranches ./internal/api/...

  go-test-cov:
    # CI-SPLIT-RACE-COV: coverage-only job, no race. Deterministic coverage
    # value — race detector affects goroutine scheduling, which makes some
    # defer/panic branches hit non-deterministically (e.g. ws/hub.go::
    # StartHeartbeat 33.3% no-race vs 58.3% with-race), bleeding into
    # coverage % flakes ±0.1%. Replaces the legacy `go-test` job; ruleset
    # required-checks should reference both `go-test-race` + `go-test-cov`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run tests with coverage (no race)
        # TEST-FIX-3: cov job 加 race_heavy build tag — race_heavy 文件
        # (closed_store_race_test.go::TestClosedStoreInternalErrorBranches)
        # 走此 tag 跑覆盖, 否则 11 sub-test 覆盖度丢 (≥0.3% 总 cov 跌破 84%
        # 阈值). 不带 -race 所以 timing/leak 不复发, 安全包含.
        # 立场 ②: 不降 cov 阈值铁律 — race_heavy 隔离仅针对 race detector
        # serialize 长 (主 race job timeout), 不针对 cov 路径.
        run: cd packages/server-go && go test -tags 'sqlite_fts5 race_heavy' -timeout=180s -coverprofile=coverage.out -coverpkg=borgee-server/internal/api,borgee-server/internal/auth,borgee-server/internal/config,borgee-server/internal/store,borgee-server/internal/ws,borgee-server/internal/server ./...
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cd packages/server-go && go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          # Threshold = 84% (deterministic no-race baseline; was 85% with race
          # but race scheduler bumps StartHeartbeat coverage 33.3%→58.3%
          # non-deterministically. New invariant: 84% no-race deterministic
          # is the truth; the prior 85% was race-detector flake masquerading
          # as ratchet — relying on it was the bug we're fixing).
          if (( $(echo "$COVERAGE < 84" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 84% threshold"
            exit 1
          fi

  bpp-envelope-lint:
    # BPP-1 (#274/#280) envelope CI lint — G2.6 真落.
    # Pins 5 invariants (byte-identical with RT-0 #237, direction lock
    # control 6 / data 3, frame whitelist closure, godoc anchor) +
    # reverse-grep guard against stray full-replay defaults.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run BPP-1 envelope lint
        run: ./scripts/lint-bpp-envelope.sh

  e2e:
    # INFRA-2: Playwright dual-server smoke. Boots server-go (4901) + vite (5174)
    # via playwright.config webServer; smoke is 3 assertions (~5s) but chromium
    # install dominates (~1min). RT-0 / CM-onboarding / G2.4 will pile on here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --filter @borgee/e2e --filter @borgee/client
      - name: Install Playwright chromium
        run: pnpm --filter @borgee/e2e exec playwright install --with-deps chromium
      - name: Type-check client (vite dev needs tsc-clean code)
        run: pnpm --filter @borgee/client build
      - name: Pre-fetch server-go modules
        run: cd packages/server-go && go mod download
      - name: Run E2E
        run: pnpm --filter @borgee/e2e test
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 14

  hb20-ipc-prereq:
    # HB-2.0 prerequisite — IPC primitive smoke per OS (Linux UDS / macOS UDS
    # / Windows Named Pipe). Build-tag-per-platform; matrix runs each smoke
    # test on its native runner. Gates HB-2 v0(C) host-bridge daemon
    # (packages/borgee-helper/ Go cmd 真启 IPC server 反约束 build-tag drift).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: HB-2.0 IPC primitive smoke (build tag per OS)
        run: cd packages/server-go && go test ./internal/helper/...
