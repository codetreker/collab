services:
  collab:
    build: .
    restart: always
    ports:
      - "4900:4900"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=4900
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/collab.db
      - UPLOAD_DIR=/app/data/uploads
      - JWT_SECRET=change-me-in-production
      - ADMIN_EMAIL=admin@codetrek.work
      - ADMIN_PASSWORD=admin123
