services:
  borgee:
    # NOTE: Production uses Harbor image via CI/CD pipeline.
    # For local dev, use 'pnpm dev' instead of docker compose.
    image: borgee:local
    restart: always
    ports:
      - "4900:4900"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=4900
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/collab.db
      - UPLOAD_DIR=/app/data/uploads
      - WORKSPACE_DIR=/app/data/workspaces
      - CLIENT_DIST=/app/client/dist
      - JWT_SECRET=${JWT_SECRET:-local-dev-jwt-secret}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    env_file:
      - .env
