services:
  borgee:
    # NOTE: Production uses Harbor image via CI/CD pipeline.
    # For local dev, use 'pnpm dev' instead of docker compose.
    image: borgee:local
    restart: always
    ports:
      - "4900:4900"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=4900
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/collab.db
      - UPLOAD_DIR=/app/data/uploads
    env_file:
      - .env
